<style>
  /* ===== Google Fonts ===== */
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=Outfit:wght@300;400;500;600&display=swap');

  /* ===== CSS Variables ===== */
  :root {
    --primary: #3B82F6;
    --primary-dark: #1D4ED8;
    --primary-light: #DBEAFE;
    --accent: #F59E0B;
    --bg: #F0F7FF;
    --bg-alt: #EFF6FF;
    --surface: #FFFFFF;
    --text-primary: #0F172A;
    --text-secondary: #475569;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --shadow-sm: 0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
    --shadow-md: 0 4px 16px rgba(59,130,246,0.10), 0 2px 4px rgba(15,23,42,0.06);
    --shadow-lg: 0 8px 32px rgba(59,130,246,0.14), 0 4px 8px rgba(15,23,42,0.08);
    --radius: 0.75rem;
    --radius-lg: 1.25rem;
  }

  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Outfit', -apple-system, sans-serif;
    font-size: 1rem;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== Entrance Animations ===== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes floatDot {
    0%, 100% { transform: translateY(0px) scale(1); }
    50%       { transform: translateY(-8px) scale(1.05); }
  }

  /* ===== Layout ===== */
  .page-wrapper {
    max-width: 72rem;
    margin: 0 auto;
    padding: 0 2rem;
  }

  /* ===== Nav ===== */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 2rem;
    max-width: 72rem;
    margin: 0 auto;
    animation: fadeIn 0.6s ease both;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    text-decoration: none;
  }

  .nav-logo {
    width: 2rem;
    height: 2rem;
    background: var(--primary);
    border-radius: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-logo svg { display: block; }

  .nav-brand-name {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1.125rem;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .nav-badge {
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--primary);
    background: var(--primary-light);
    padding: 0.125rem 0.5rem;
    border-radius: 2rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ===== Hero ===== */
  .hero {
    position: relative;
    padding: 5rem 2rem 4rem;
    max-width: 72rem;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
    overflow: visible;
  }

  .hero-content { position: relative; z-index: 1; }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--primary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    animation: fadeUp 0.7s 0.1s ease both;
  }

  .hero-eyebrow-dot {
    width: 0.375rem;
    height: 0.375rem;
    border-radius: 50%;
    background: var(--accent);
    animation: floatDot 3s ease-in-out infinite;
  }

  .hero-title {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(2.5rem, 5vw, 3.75rem);
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    margin-bottom: 1.25rem;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  .hero-title em {
    font-style: italic;
    font-weight: 300;
    color: var(--primary);
  }

  .hero-desc {
    font-size: 1.0625rem;
    color: var(--text-secondary);
    font-weight: 300;
    line-height: 1.7;
    max-width: 36ch;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.7s 0.3s ease both;
  }

  .hero-cta-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    animation: fadeUp 0.7s 0.4s ease both;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--primary);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.9375rem;
    padding: 0.75rem 1.75rem;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 150ms ease, box-shadow 150ms ease, transform 150ms ease;
    box-shadow: 0 2px 8px rgba(59,130,246,0.30);
  }

  .btn-primary:hover {
    background: var(--primary-dark);
    box-shadow: 0 4px 16px rgba(59,130,246,0.40);
    transform: translateY(-1px);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    font-size: 0.9375rem;
    padding: 0.75rem 1rem;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: color 150ms ease, background 150ms ease;
  }

  .btn-ghost:hover {
    color: var(--text-primary);
    background: var(--primary-light);
  }

  /* ===== Hero Visual ===== */
  .hero-visual {
    display: flex;
    justify-content: flex-end;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .hero-card-stack {
    position: relative;
    width: 22rem;
    height: 18rem;
  }

  .hero-card-bg {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
  }

  .hero-card-bg:nth-child(1) {
    inset: 0;
    transform: rotate(-4deg) translateY(8px);
    opacity: 0.5;
    background: #DBEAFE;
  }

  .hero-card-bg:nth-child(2) {
    inset: 0;
    transform: rotate(-1.5deg) translateY(4px);
    opacity: 0.7;
  }

  .hero-card-main {
    position: absolute;
    inset: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    overflow: hidden;
  }

  .hero-card-header {
    display: flex;
    align-items: center;
    gap: 0.625rem;
  }

  .hero-card-icon {
    width: 2rem;
    height: 2rem;
    background: var(--primary-light);
    border-radius: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .hero-card-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 0.9375rem;
    color: var(--text-primary);
  }

  .hero-card-subtitle {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .hero-card-rows {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    flex: 1;
  }

  .hero-card-row {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.5rem 0.75rem;
    background: var(--bg-alt);
    border-radius: 0.5rem;
  }

  .hero-card-row-dot {
    width: 0.375rem;
    height: 0.375rem;
    border-radius: 50%;
    background: var(--primary);
    flex-shrink: 0;
  }

  .hero-card-row-label {
    font-size: 0.8125rem;
    color: var(--text-secondary);
    flex: 1;
  }

  .hero-card-row-tag {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.125rem 0.5rem;
    border-radius: 2rem;
  }

  .tag-blue { background: var(--primary-light); color: var(--primary); }
  .tag-green { background: #DCFCE7; color: #16A34A; }
  .tag-amber { background: #FEF3C7; color: #D97706; }

  .hero-card-footer {
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .hero-card-stat {
    text-align: center;
  }

  .hero-card-stat-num {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1.125rem;
    color: var(--primary);
  }

  .hero-card-stat-label {
    font-size: 0.6875rem;
    color: var(--text-muted);
    margin-top: 0.125rem;
  }

  /* ===== Divider ===== */
  .section-divider {
    max-width: 72rem;
    margin: 0 auto;
    padding: 0 2rem;
  }

  .section-divider hr {
    border: none;
    border-top: 1px solid var(--border);
  }

  /* ===== Features Section ===== */
  .features {
    padding: 5rem 2rem;
    max-width: 72rem;
    margin: 0 auto;
  }

  .section-header {
    text-align: center;
    margin-bottom: 3.5rem;
  }

  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--primary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .section-label-line {
    width: 1.5rem;
    height: 1px;
    background: var(--primary);
    opacity: 0.5;
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(1.875rem, 3.5vw, 2.75rem);
    letter-spacing: -0.025em;
    color: var(--text-primary);
    line-height: 1.15;
    margin-bottom: 0.875rem;
  }

  .section-title em {
    font-style: italic;
    font-weight: 300;
    color: var(--primary);
  }

  .section-desc {
    font-size: 1rem;
    color: var(--text-secondary);
    font-weight: 300;
    max-width: 48ch;
    margin: 0 auto;
  }

  /* ===== Feature Grid ===== */
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.25rem;
  }

  .feature-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    transition: box-shadow 200ms ease, transform 200ms ease, border-color 200ms ease;
    cursor: default;
  }

  .feature-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-3px);
    border-color: var(--primary-light);
  }

  .feature-card--featured {
    grid-column: span 2;
    flex-direction: row;
    align-items: flex-start;
    gap: 1.5rem;
    background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
    border-color: #BFDBFE;
  }

  .feature-card--featured:hover { border-color: var(--primary); }

  .feature-icon-wrap {
    width: 2.75rem;
    height: 2.75rem;
    border-radius: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .feature-icon-wrap--blue   { background: var(--primary-light); }
  .feature-icon-wrap--indigo { background: #E0E7FF; }
  .feature-icon-wrap--green  { background: #DCFCE7; }
  .feature-icon-wrap--amber  { background: #FEF3C7; }
  .feature-icon-wrap--rose   { background: #FFE4E6; }
  .feature-icon-wrap--purple { background: #F3E8FF; }

  .feature-body { flex: 1; min-width: 0; }

  .feature-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.0625rem;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin-bottom: 0.375rem;
  }

  .feature-desc {
    font-size: 0.875rem;
    color: var(--text-secondary);
    font-weight: 300;
    line-height: 1.65;
  }

  .feature-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.25rem 0.625rem;
    border-radius: 2rem;
    margin-top: 0.5rem;
  }

  .feature-tag--new { background: #FEF3C7; color: #B45309; }
  .feature-tag--core { background: var(--primary-light); color: var(--primary-dark); }

  /* ===== Stats Bar ===== */
  .stats-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem;
  }

  .stats-inner {
    max-width: 72rem;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2rem;
    text-align: center;
  }

  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 2.25rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 0.375rem;
  }

  .stat-label {
    font-size: 0.875rem;
    color: var(--text-muted);
    font-weight: 400;
  }

  .stat-divider {
    width: 1px;
    background: var(--border);
    margin: 0 auto;
    height: 100%;
    display: none;
  }

  /* ===== CTA Section ===== */
  .cta-section {
    padding: 5rem 2rem;
    max-width: 72rem;
    margin: 0 auto;
    text-align: center;
  }

  .cta-card {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    border-radius: 1.5rem;
    padding: 4rem 3rem;
    position: relative;
    overflow: hidden;
  }

  .cta-card::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 32rem;
    height: 32rem;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .cta-card::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -5%;
    width: 20rem;
    height: 20rem;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .cta-title {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(1.875rem, 3vw, 2.5rem);
    color: #fff;
    letter-spacing: -0.025em;
    line-height: 1.15;
    margin-bottom: 1rem;
    position: relative;
  }

  .cta-title em {
    font-style: italic;
    font-weight: 300;
    opacity: 0.85;
  }

  .cta-desc {
    font-size: 1rem;
    color: rgba(255,255,255,0.75);
    font-weight: 300;
    max-width: 44ch;
    margin: 0 auto 2rem;
    line-height: 1.7;
    position: relative;
  }

  .cta-btn-row {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    position: relative;
  }

  .btn-cta-white {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: #fff;
    color: var(--primary-dark);
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.9375rem;
    padding: 0.75rem 1.75rem;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 150ms ease, transform 150ms ease, box-shadow 150ms ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .btn-cta-white:hover {
    background: var(--bg);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }

  .btn-cta-outline {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: transparent;
    color: rgba(255,255,255,0.9);
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    font-size: 0.9375rem;
    padding: 0.75rem 1.5rem;
    border-radius: var(--radius);
    border: 1.5px solid rgba(255,255,255,0.4);
    cursor: pointer;
    text-decoration: none;
    transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
  }

  .btn-cta-outline:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.7);
    transform: translateY(-1px);
  }

  /* ===== Footer ===== */
  .footer {
    border-top: 1px solid var(--border);
    padding: 2rem;
  }

  .footer-inner {
    max-width: 72rem;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .footer-brand {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 0.9375rem;
    color: var(--text-primary);
  }

  .footer-note {
    font-size: 0.8125rem;
    color: var(--text-muted);
  }

  .footer-links {
    display: flex;
    gap: 1.5rem;
  }

  .footer-link {
    font-size: 0.8125rem;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 150ms ease;
  }

  .footer-link:hover { color: var(--primary); }

  /* ===== Scroll Reveal ===== */
  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.55s ease, transform 0.55s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .reveal-delay-1 { transition-delay: 0.05s; }
  .reveal-delay-2 { transition-delay: 0.12s; }
  .reveal-delay-3 { transition-delay: 0.19s; }
  .reveal-delay-4 { transition-delay: 0.26s; }
  .reveal-delay-5 { transition-delay: 0.33s; }

  /* ===== Responsive ===== */
  @media (max-width: 900px) {
    .hero {
      grid-template-columns: 1fr;
      padding: 3rem 1.5rem 2rem;
      gap: 2.5rem;
    }

    .hero-desc { max-width: none; }

    .hero-visual { justify-content: center; }

    .hero-card-stack { width: 20rem; height: 16rem; }

    .feature-grid { grid-template-columns: 1fr 1fr; }

    .feature-card--featured {
      grid-column: span 2;
      flex-direction: column;
    }

    .stats-inner { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 600px) {
    .nav { padding: 1.25rem 1.25rem; }

    .hero { padding: 2.5rem 1.25rem 2rem; }

    .hero-card-stack { width: 100%; max-width: 20rem; }

    .features { padding: 3rem 1.25rem; }

    .feature-grid { grid-template-columns: 1fr; }

    .feature-card--featured { grid-column: span 1; }

    .stats-inner { grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }

    .cta-card { padding: 2.5rem 1.5rem; }

    .cta-section { padding: 3rem 1.25rem; }
  }
</style>
